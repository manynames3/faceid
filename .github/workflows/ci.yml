name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Lint, test, build, and validate IaC
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Compile Lambda
        run: python3 -m py_compile backend/lambda/app.py

      - name: Check Terraform formatting
        run: terraform -chdir=infra/terraform fmt -check

      - name: Initialize Terraform
        run: terraform -chdir=infra/terraform init -backend=false

      - name: Validate Terraform
        run: terraform -chdir=infra/terraform validate
